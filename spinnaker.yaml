apiVersion: v1
kind: Namespace
metadata:
  name: spinnaker
  labels:
    app: spinnaker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: spinnaker
  name: spinnaker
  labels:
    app: spinnaker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spinnaker-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - namespace: spinnaker
    kind: ServiceAccount
    name: spinnaker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: spinnaker
  name: halyard
  labels:
    app: spinnaker
    component: halyard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  namespace: spinnaker
  name: secrets
  labels:
    app: spinnaker
type: Opaque
data:
  jenkins-password: NTMxMTRkYzE0MTg2MTM4OTkwYWE4ZTZlNWZlZmFhOTg=
  spinnaker-gcr-account.json: 
  spinnaker-gcs-account.json: 
  spinnaker-pubsub-account.json: 
---
apiVersion: certmanager.k8s.io/v1alpha1
kind: Certificate
metadata:
  namespace: spinnaker
  name: spinnaker
  labels:
    app: spinnaker
spec:
  secretName: spinnaker-crt
  issuerRef:
    kind: ClusterIssuer
    name: cluster-issuer
  commonName: spinnaker.kfirs.com
  dnsNames:
    - spinnaker.kfirs.com
    - gate.spinnaker.kfirs.com
  acme:
    config:
      - dns01:
          provider: cloudflare
        domains:
          - spinnaker.kfirs.com
          - gate.spinnaker.kfirs.com
---
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  namespace: spinnaker
  name: spinnaker
  labels:
    app: spinnaker
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    traefik.ingress.kubernetes.io/whitelist-source-range: "${WHITELISTED_IP_CIDRS}"
spec:
  rules:
    - host: spinnaker.kfirs.com
      http:
        paths:
          - backend:
              serviceName: spin-deck
              servicePort: 9000
    - host: gate.spinnaker.kfirs.com
      http:
        paths:
          - backend:
              serviceName: spin-gate
              servicePort: 8084
  tls:
    - hosts:
        - spinnaker.kfirs.com
        - gate.spinnaker.kfirs.com
      secretName: spinnaker-crt
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: spinnaker
  name: config
  labels:
    app: spinnaker
data:
  setup.sh: |
    #!/usr/bin/env bash

    set -eu -o pipefail

    # setup "~/.kube"
    [[ ! -d ~/.hal/.kube ]] && mkdir -pv ~/.hal/.kube
    [[ ! -L ~/.kube ]] && (rm -rfv ~/.kube; ln -s ~/.hal/.kube ~/.kube)
    kubectl config set-cluster devops --server=https://kubernetes.default --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    kubectl config set-credentials serviceaccount --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    kubectl config set-context devops --cluster=devops --user=serviceaccount
    kubectl config use-context devops

    # setup ~/.bashrc
    grep -e "^alias ll" /home/spinnaker/.bashrc > /dev/null || echo "alias ll='ls -l'" >> /home/spinnaker/.bashrc
    grep -e "^alias la" /home/spinnaker/.bashrc > /dev/null || echo "alias la='ls -la'" >> /home/spinnaker/.bashrc
    grep -e "^source <(hal --print-bash-completion)" /home/spinnaker/.bashrc > /dev/null || echo "source <(hal --print-bash-completion)" >> /home/spinnaker/.bashrc

  configure.sh: |
    #!/usr/bin/env bash

    set -eu -o pipefail

    PROJECT=arikkfir
    BUCKET=arikkfir-spinnaker
    GCR_SA_KEY_FILE=/home/spinnaker/secrets/spinnaker-gcr-account.json
    GCS_SA_KEY_FILE=/home/spinnaker/secrets/spinnaker-gcs-account.json
    PUBSUB_SA_KEY_FILE=/home/spinnaker/secrets/spinnaker-pubsub-account.json
    JENKINS_PWD=$(cat /home/spinnaker/secrets/jenkins-password)
    VERSION=1.12.7

    # public URLs
    hal config security api edit --override-base-url https://gate.spinnaker.kfirs.com
    hal config security ui edit --override-base-url https://spinnaker.kfirs.com

    # cloud providers
    hal config provider kubernetes enable
    hal config provider kubernetes account add k8s-devops --provider-version v2 --context devops

    # storage
    hal config storage gcs edit --project ${PROJECT} \
        --bucket ${BUCKET} \
        --json-path ${GCS_SA_KEY_FILE}
    hal config storage edit --type gcs

    # artifacts
    hal config features edit --artifacts true
    hal config artifact gcs account add gcs --json-path ${GCS_SA_KEY_FILE}
    hal config artifact gcs enable

    # pubsub
    hal config pubsub google enable
    hal config pubsub google subscription add google-pubsub-gcr \
        --subscription-name spinnaker-gcr \
        --json-path ${PUBSUB_SA_KEY_FILE} \
        --project ${PROJECT} \
        --message-format GCR
    hal config pubsub google subscription add google-pubsub-cloud-builds \
        --subscription-name spinnaker-cloud-builds \
        --json-path ${PUBSUB_SA_KEY_FILE} \
        --project ${PROJECT} \
        --message-format GCB

    # jenkins
    hal config ci jenkins enable
    echo ${JENKINS_PWD} | hal config ci jenkins master add master \
        --address http://master.jenkins \
        --username spinnaker \
        --password

    # deployment
    hal config deploy edit --type distributed --account-name k8s-devops
    hal config version edit --version ${VERSION}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: spinnaker
  name: halyard
  labels:
    app: spinnaker
    component: halyard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinnaker
      component: halyard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: spinnaker
        component: halyard
    spec:
      serviceAccountName: spinnaker
      initContainers:
        - name: init-chown-data
          image: busybox:latest
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
          command: ["chown", "-R", "1000:1000", "/data"]
          volumeMounts:
            - name: storage
              mountPath: /data
      containers:
        - name: halyard
          image: gcr.io/spinnaker-marketplace/halyard:1.17.0
          lifecycle:
            postStart:
              exec:
                command: [bash, -c, 'bash /home/spinnaker/bin/setup.sh']
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /home/spinnaker/bin
              readOnly: true
            - name: secrets
              mountPath: /home/spinnaker/secrets
              readOnly: true
            - name: storage
              mountPath: /home/spinnaker/.hal
              readOnly: false
      volumes:
        - name: config
          configMap:
            name: config
            optional: false
        - name: secrets
          secret:
            secretName: secrets
            optional: false
        - name: storage
          persistentVolumeClaim:
            claimName: halyard
            readOnly: false
---
