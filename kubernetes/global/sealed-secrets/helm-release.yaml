apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sealed-secrets
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: sealed-secrets
      version: 1.15.0-r1
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
      interval: 1m
  releaseName: sealed-secrets
  values:
    resources:
      limits:
        cpu: 500m
        memory: 100Mi
      requests:
        cpu: 200m
        memory: 100Mi
    crd:
      keep: false
